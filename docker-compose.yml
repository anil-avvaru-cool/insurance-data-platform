services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    networks:
      - app-network

  neo4j:
    image: neo4j:5.11
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_bolt_advertised__address: neo4j:7687
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "MATCH () RETURN count(*) limit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  app:
    build: .    
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"  # Falls back to 1000 if variables are empty
    depends_on:
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      REDIS_URL: "${REDIS_URL}"
      NEO4J_URI: "${NEO4J_URI}"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      HOME: /tmp
    networks:
      - app-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  app-network:
    driver: bridge
